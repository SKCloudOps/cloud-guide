<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ff9900"/></marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto"><path d="M0,0 L3,8 L6,0" fill="#ff9900"/></marker>
  </defs>
  <rect width="900" height="460" rx="12" fill="#f8fafc"/>
  <rect width="900" height="52" rx="12" fill="#0f1b2d"/>
  <rect y="40" width="900" height="12" fill="#0f1b2d"/>
  <text x="450" y="33" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Serverless Web Application Architecture on AWS</text>

  <!-- User -->
  <rect x="30" y="125" width="80" height="65" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="155" fill="#0f1b2d" font-size="20" text-anchor="middle">👤</text>
  <text x="70" y="175" fill="#334155" font-size="10" font-weight="600" text-anchor="middle">User</text>

  <!-- Layer 1: Route 53 -->
  <line x1="110" y1="157" x2="148" y2="157" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="150" y="125" width="100" height="65" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="150" y="125" width="100" height="22" rx="8" fill="#3b82f6"/>
  <rect x="150" y="141" width="100" height="6" fill="#3b82f6"/>
  <text x="200" y="141" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">DNS</text>
  <text x="200" y="162" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">Route 53</text>
  <text x="200" y="177" fill="#64748b" font-size="8" text-anchor="middle">Health checks</text>

  <!-- Layer 2: CloudFront -->
  <line x1="250" y1="157" x2="278" y2="157" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="280" y="125" width="100" height="65" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="125" width="100" height="22" rx="8" fill="#8b5cf6"/>
  <rect x="280" y="141" width="100" height="6" fill="#8b5cf6"/>
  <text x="330" y="141" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">CDN</text>
  <text x="330" y="162" fill="#6b21a8" font-size="10" font-weight="600" text-anchor="middle">CloudFront</text>
  <text x="330" y="177" fill="#64748b" font-size="8" text-anchor="middle">450+ edge PoPs</text>

  <!-- Layer 3: S3 (static) -->
  <line x1="380" y1="140" x2="408" y2="100" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="410" y="75" width="120" height="55" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="410" y="75" width="120" height="22" rx="8" fill="#22c55e"/>
  <rect x="410" y="91" width="120" height="6" fill="#22c55e"/>
  <text x="470" y="91" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">FRONTEND</text>
  <text x="470" y="110" fill="#166534" font-size="10" font-weight="600" text-anchor="middle">S3 Static Site</text>
  <text x="470" y="123" fill="#64748b" font-size="8" text-anchor="middle">HTML · CSS · JS · React</text>

  <!-- API path -->
  <line x1="380" y1="170" x2="408" y2="200" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="370" y="195" fill="#64748b" font-size="8" text-anchor="end">API calls</text>

  <!-- Layer 4: API Gateway -->
  <rect x="410" y="185" width="120" height="55" rx="8" fill="#fff" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="410" y="185" width="120" height="22" rx="8" fill="#f97316"/>
  <rect x="410" y="201" width="120" height="6" fill="#f97316"/>
  <text x="470" y="201" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">API</text>
  <text x="470" y="220" fill="#9a3412" font-size="10" font-weight="600" text-anchor="middle">API Gateway</text>
  <text x="470" y="233" fill="#64748b" font-size="8" text-anchor="middle">HTTP API (70% cheaper)</text>

  <!-- Cognito -->
  <rect x="570" y="125" width="120" height="55" rx="8" fill="#fff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="570" y="125" width="120" height="22" rx="8" fill="#ec4899"/>
  <rect x="570" y="141" width="120" height="6" fill="#ec4899"/>
  <text x="630" y="141" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">AUTH</text>
  <text x="630" y="160" fill="#9d174d" font-size="10" font-weight="600" text-anchor="middle">Cognito</text>
  <text x="630" y="173" fill="#64748b" font-size="8" text-anchor="middle">JWT · MFA · Social</text>
  <line x1="530" y1="200" x2="570" y2="165" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="555" y="187" fill="#ec4899" font-size="7" font-weight="600">JWT</text>

  <!-- Layer 5: Lambda -->
  <line x1="530" y1="215" x2="568" y2="295" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="570" y="275" width="120" height="55" rx="8" fill="#fff" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="570" y="275" width="120" height="22" rx="8" fill="#f97316"/>
  <rect x="570" y="291" width="120" height="6" fill="#f97316"/>
  <text x="630" y="291" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">LOGIC</text>
  <text x="630" y="310" fill="#9a3412" font-size="10" font-weight="600" text-anchor="middle">Lambda</text>
  <text x="630" y="323" fill="#64748b" font-size="8" text-anchor="middle">Stateless · Auto-scale</text>

  <!-- Layer 6: DynamoDB -->
  <line x1="690" y1="302" x2="728" y2="302" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="730" y="275" width="140" height="55" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="275" width="140" height="22" rx="8" fill="#3b82f6"/>
  <rect x="730" y="291" width="140" height="6" fill="#3b82f6"/>
  <text x="800" y="291" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">DATABASE</text>
  <text x="800" y="310" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">DynamoDB</text>
  <text x="800" y="323" fill="#64748b" font-size="8" text-anchor="middle">Serverless NoSQL · &lt;10ms</text>

  <!-- S3 uploads -->
  <rect x="730" y="185" width="140" height="55" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="730" y="185" width="140" height="22" rx="8" fill="#22c55e"/>
  <rect x="730" y="201" width="140" height="6" fill="#22c55e"/>
  <text x="800" y="201" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">FILE STORAGE</text>
  <text x="800" y="220" fill="#166534" font-size="10" font-weight="600" text-anchor="middle">S3</text>
  <text x="800" y="233" fill="#64748b" font-size="8" text-anchor="middle">Pre-signed URLs</text>
  <line x1="690" y1="290" x2="730" y2="225" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step Functions -->
  <rect x="410" y="275" width="120" height="55" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="410" y="275" width="120" height="22" rx="8" fill="#8b5cf6"/>
  <rect x="410" y="291" width="120" height="6" fill="#8b5cf6"/>
  <text x="470" y="291" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">ORCHESTRATION</text>
  <text x="470" y="310" fill="#6b21a8" font-size="10" font-weight="600" text-anchor="middle">Step Functions</text>
  <text x="470" y="323" fill="#64748b" font-size="8" text-anchor="middle">Multi-step workflows</text>
  <line x1="570" y1="302" x2="530" y2="302" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- SNS/SES -->
  <rect x="410" y="355" width="120" height="45" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="375" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">SNS + SES</text>
  <text x="470" y="390" fill="#64748b" font-size="8" text-anchor="middle">Notifications · Email</text>
  <line x1="630" y1="330" x2="530" y2="365" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Cost box -->
  <rect x="30" y="360" width="340" height="90" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="45" y="382" fill="#1e40af" font-size="11" font-weight="700">💰 Cost Profile (1M req/month)</text>
  <text x="45" y="400" fill="#334155" font-size="10">Serverless: ~$5–20/month total</text>
  <text x="45" y="415" fill="#334155" font-size="10">EC2 equivalent: ~$50–100+/month minimum</text>
  <text x="45" y="432" fill="#64748b" font-size="9">Pay per request · No idle cost · Auto-scale</text>
  <text x="45" y="445" fill="#ef4444" font-size="9" font-weight="600">⚠ Not ideal: long-running, WebSocket, in-memory state</text>
</svg>
