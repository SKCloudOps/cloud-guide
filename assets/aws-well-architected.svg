<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="900" height="440" rx="12" fill="#f8fafc"/>
  <rect width="900" height="52" rx="12" fill="#0f1b2d"/>
  <rect y="40" width="900" height="12" fill="#0f1b2d"/>
  <text x="450" y="33" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">AWS Well-Architected Framework — 6 Pillars</text>

  <!-- Pillar 1: Operational Excellence -->
  <rect x="20" y="70" width="280" height="165" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="70" width="280" height="36" rx="10" fill="#3b82f6"/>
  <rect x="20" y="96" width="280" height="10" fill="#3b82f6"/>
  <text x="32" y="95" fill="#fff" font-size="13" font-weight="700">⚙️  1. Operational Excellence</text>
  <text x="32" y="125" fill="#334155" font-size="11" font-weight="600">Focus: Run &amp; monitor systems</text>
  <text x="32" y="143" fill="#64748b" font-size="10">• Infrastructure as Code (CloudFormation)</text>
  <text x="32" y="158" fill="#64748b" font-size="10">• Small, reversible changes</text>
  <text x="32" y="173" fill="#64748b" font-size="10">• Anticipate &amp; learn from failure</text>
  <text x="32" y="188" fill="#64748b" font-size="10">• Runbooks &amp; playbooks</text>
  <rect x="32" y="200" width="254" height="20" rx="4" fill="#eff6ff"/>
  <text x="159" y="214" fill="#1e40af" font-size="9" font-weight="600" text-anchor="middle">CloudFormation · CloudWatch · SSM · Config</text>

  <!-- Pillar 2: Security -->
  <rect x="310" y="70" width="280" height="165" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="70" width="280" height="36" rx="10" fill="#ef4444"/>
  <rect x="310" y="96" width="280" height="10" fill="#ef4444"/>
  <text x="322" y="95" fill="#fff" font-size="13" font-weight="700">🛡️  2. Security</text>
  <text x="322" y="125" fill="#334155" font-size="11" font-weight="600">Focus: Protect data &amp; systems</text>
  <text x="322" y="143" fill="#64748b" font-size="10">• Least privilege (IAM policies)</text>
  <text x="322" y="158" fill="#64748b" font-size="10">• Encryption at rest &amp; in transit (KMS)</text>
  <text x="322" y="173" fill="#64748b" font-size="10">• Security at all layers</text>
  <text x="322" y="188" fill="#64748b" font-size="10">• Enable traceability (CloudTrail)</text>
  <rect x="322" y="200" width="254" height="20" rx="4" fill="#fef2f2"/>
  <text x="449" y="214" fill="#991b1b" font-size="9" font-weight="600" text-anchor="middle">IAM · KMS · WAF · Shield · GuardDuty · Security Hub</text>

  <!-- Pillar 3: Reliability -->
  <rect x="600" y="70" width="280" height="165" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="70" width="280" height="36" rx="10" fill="#22c55e"/>
  <rect x="600" y="96" width="280" height="10" fill="#22c55e"/>
  <text x="612" y="95" fill="#fff" font-size="13" font-weight="700">🔄  3. Reliability</text>
  <text x="612" y="125" fill="#334155" font-size="11" font-weight="600">Focus: Recover from failure</text>
  <text x="612" y="143" fill="#64748b" font-size="10">• Auto-recover from failure</text>
  <text x="612" y="158" fill="#64748b" font-size="10">• Test recovery procedures</text>
  <text x="612" y="173" fill="#64748b" font-size="10">• Scale horizontally (not vertically)</text>
  <text x="612" y="188" fill="#64748b" font-size="10">• Stop guessing capacity</text>
  <rect x="612" y="200" width="254" height="20" rx="4" fill="#f0fdf4"/>
  <text x="739" y="214" fill="#166534" font-size="9" font-weight="600" text-anchor="middle">Auto Scaling · Multi-AZ · Route 53 · Backup</text>

  <!-- Pillar 4: Performance Efficiency -->
  <rect x="20" y="250" width="280" height="165" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="250" width="280" height="36" rx="10" fill="#8b5cf6"/>
  <rect x="20" y="276" width="280" height="10" fill="#8b5cf6"/>
  <text x="32" y="275" fill="#fff" font-size="13" font-weight="700">🚀  4. Performance Efficiency</text>
  <text x="32" y="305" fill="#334155" font-size="11" font-weight="600">Focus: Use resources wisely</text>
  <text x="32" y="323" fill="#64748b" font-size="10">• Right-size instances (Compute Optimizer)</text>
  <text x="32" y="338" fill="#64748b" font-size="10">• Use managed/serverless services</text>
  <text x="32" y="353" fill="#64748b" font-size="10">• Go global in minutes (CloudFront)</text>
  <text x="32" y="368" fill="#64748b" font-size="10">• Experiment &amp; benchmark often</text>
  <rect x="32" y="380" width="254" height="20" rx="4" fill="#f5f3ff"/>
  <text x="159" y="394" fill="#6b21a8" font-size="9" font-weight="600" text-anchor="middle">Lambda · CloudFront · ElastiCache · Compute Optimizer</text>

  <!-- Pillar 5: Cost Optimization -->
  <rect x="310" y="250" width="280" height="165" rx="10" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="310" y="250" width="280" height="36" rx="10" fill="#f97316"/>
  <rect x="310" y="276" width="280" height="10" fill="#f97316"/>
  <text x="322" y="275" fill="#fff" font-size="13" font-weight="700">💰  5. Cost Optimization</text>
  <text x="322" y="305" fill="#334155" font-size="11" font-weight="600">Focus: Eliminate waste</text>
  <text x="322" y="323" fill="#64748b" font-size="10">• Pay only for what you consume</text>
  <text x="322" y="338" fill="#64748b" font-size="10">• Right-size &amp; use Savings Plans</text>
  <text x="322" y="353" fill="#64748b" font-size="10">• Spot Instances for fault-tolerant</text>
  <text x="322" y="368" fill="#64748b" font-size="10">• S3 lifecycle &amp; Intelligent-Tiering</text>
  <rect x="322" y="380" width="254" height="20" rx="4" fill="#fff7ed"/>
  <text x="449" y="394" fill="#9a3412" font-size="9" font-weight="600" text-anchor="middle">Cost Explorer · Budgets · Savings Plans · Spot</text>

  <!-- Pillar 6: Sustainability -->
  <rect x="600" y="250" width="280" height="165" rx="10" fill="#fff" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="250" width="280" height="36" rx="10" fill="#14b8a6"/>
  <rect x="600" y="276" width="280" height="10" fill="#14b8a6"/>
  <text x="612" y="275" fill="#fff" font-size="13" font-weight="700">🌱  6. Sustainability</text>
  <text x="612" y="305" fill="#334155" font-size="11" font-weight="600">Focus: Minimize environmental impact</text>
  <text x="612" y="323" fill="#64748b" font-size="10">• Maximize utilization</text>
  <text x="612" y="338" fill="#64748b" font-size="10">• Use Graviton (ARM) instances</text>
  <text x="612" y="353" fill="#64748b" font-size="10">• Reduce downstream impact</text>
  <text x="612" y="368" fill="#64748b" font-size="10">• Adopt efficient offerings</text>
  <rect x="612" y="380" width="254" height="20" rx="4" fill="#f0fdfa"/>
  <text x="739" y="394" fill="#115e59" font-size="9" font-weight="600" text-anchor="middle">Graviton · S3 Intelligent-Tiering · Compute Optimizer</text>

  <!-- Bottom tip -->
  <rect x="20" y="422" width="860" height="14" rx="4" fill="#eff6ff"/>
  <text x="450" y="433" fill="#1e40af" font-size="9" font-weight="600" text-anchor="middle">💡 Use the AWS Well-Architected Tool in the console to review your workload against all 6 pillars before production launch</text>
</svg>
