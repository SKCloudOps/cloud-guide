<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ff9900"/></marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker>
  </defs>
  <rect width="900" height="480" rx="12" fill="#f8fafc"/>
  <rect width="900" height="52" rx="12" fill="#0f1b2d"/>
  <rect y="40" width="900" height="12" fill="#0f1b2d"/>
  <text x="450" y="33" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">AWS Cloud Migration — The 7 R's</text>

  <!-- On-Premises box -->
  <rect x="20" y="75" width="160" height="310" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="75" width="160" height="32" rx="10" fill="#475569"/>
  <rect x="20" y="97" width="160" height="10" fill="#475569"/>
  <text x="100" y="97" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">ON-PREMISES</text>
  <text x="100" y="130" fill="#64748b" font-size="10" text-anchor="middle">Legacy Apps</text>
  <text x="100" y="145" fill="#64748b" font-size="10" text-anchor="middle">Databases</text>
  <text x="100" y="160" fill="#64748b" font-size="10" text-anchor="middle">VMs / Bare Metal</text>
  <text x="100" y="175" fill="#64748b" font-size="10" text-anchor="middle">Storage</text>

  <!-- AWS Cloud box -->
  <rect x="520" y="75" width="360" height="310" rx="10" fill="#fff3e0" stroke="#ff9900" stroke-width="2"/>
  <text x="700" y="97" fill="#c76a00" font-size="13" font-weight="700" text-anchor="middle">AWS CLOUD</text>

  <!-- R1: Rehost -->
  <line x1="180" y1="120" x2="520" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="108" width="280" height="26" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="125" fill="#166534" font-size="11" font-weight="700">1. Rehost (Lift &amp; Shift)</text>
  <text x="430" y="125" fill="#15803d" font-size="9" text-anchor="end">MGN</text>
  <rect x="535" y="108" width="120" height="26" rx="6" fill="#dcfce7"/>
  <text x="595" y="125" fill="#166534" font-size="10" text-anchor="middle">EC2 as-is</text>

  <!-- R2: Replatform -->
  <line x1="180" y1="158" x2="520" y2="158" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="146" width="280" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="163" fill="#1e40af" font-size="11" font-weight="700">2. Replatform (Tinker &amp; Shift)</text>
  <text x="430" y="163" fill="#2563eb" font-size="9" text-anchor="end">DMS</text>
  <rect x="535" y="146" width="120" height="26" rx="6" fill="#dbeafe"/>
  <text x="595" y="163" fill="#1e40af" font-size="10" text-anchor="middle">RDS / ECS</text>

  <!-- R3: Repurchase -->
  <line x1="180" y1="196" x2="520" y2="196" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="184" width="280" height="26" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="201" fill="#6b21a8" font-size="11" font-weight="700">3. Repurchase (Move to SaaS)</text>
  <text x="430" y="201" fill="#7c3aed" font-size="9" text-anchor="end">Marketplace</text>
  <rect x="535" y="184" width="120" height="26" rx="6" fill="#ede9fe"/>
  <text x="595" y="201" fill="#6b21a8" font-size="10" text-anchor="middle">SaaS product</text>

  <!-- R4: Refactor -->
  <line x1="180" y1="234" x2="520" y2="234" stroke="#f97316" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="222" width="280" height="26" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="239" fill="#9a3412" font-size="11" font-weight="700">4. Refactor (Re-architect)</text>
  <text x="430" y="239" fill="#ea580c" font-size="9" text-anchor="end">Cloud-native</text>
  <rect x="535" y="222" width="160" height="26" rx="6" fill="#fed7aa"/>
  <text x="615" y="239" fill="#9a3412" font-size="10" text-anchor="middle">Lambda · EKS · DynamoDB</text>

  <!-- R5: Retire -->
  <rect x="210" y="265" width="200" height="26" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="282" fill="#991b1b" font-size="11" font-weight="700">5. Retire</text>
  <text x="395" y="282" fill="#dc2626" font-size="9" text-anchor="end">Decommission</text>
  <line x1="410" y1="278" x2="440" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="315" fill="#ef4444" font-size="9">🗑️</text>

  <!-- R6: Retain -->
  <rect x="210" y="300" width="200" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="317" fill="#475569" font-size="11" font-weight="700">6. Retain</text>
  <text x="395" y="317" fill="#64748b" font-size="9" text-anchor="end">Keep on-prem (now)</text>
  <line x1="210" y1="313" x2="180" y2="313" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- R7: Relocate -->
  <line x1="180" y1="350" x2="520" y2="350" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="210" y="338" width="280" height="26" rx="6" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="355" fill="#115e59" font-size="11" font-weight="700">7. Relocate</text>
  <text x="430" y="355" fill="#0d9488" font-size="9" text-anchor="end">VMware Cloud on AWS</text>
  <rect x="535" y="338" width="145" height="26" rx="6" fill="#ccfbf1"/>
  <text x="607" y="355" fill="#115e59" font-size="10" text-anchor="middle">VMware on AWS</text>

  <!-- 3 Phases at bottom -->
  <rect x="20" y="400" width="860" height="65" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="420" fill="#0f1b2d" font-size="12" font-weight="700" text-anchor="middle">Migration Process — 3 Phases</text>

  <rect x="40" y="432" width="240" height="24" rx="6" fill="#dbeafe"/>
  <text x="160" y="449" fill="#1e40af" font-size="11" font-weight="600" text-anchor="middle">1. Assess — Discovery + Business Case</text>

  <text x="290" y="449" fill="#94a3b8" font-size="14" font-weight="700">→</text>

  <rect x="310" y="432" width="260" height="24" rx="6" fill="#fef3c7"/>
  <text x="440" y="449" fill="#92400e" font-size="11" font-weight="600" text-anchor="middle">2. Mobilize — Landing Zone + Network</text>

  <text x="580" y="449" fill="#94a3b8" font-size="14" font-weight="700">→</text>

  <rect x="600" y="432" width="260" height="24" rx="6" fill="#dcfce7"/>
  <text x="730" y="449" fill="#166534" font-size="11" font-weight="600" text-anchor="middle">3. Migrate &amp; Modernize — Wave-by-wave</text>
</svg>
