<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8fafc"/>
  <!-- Header -->
  <rect width="900" height="52" rx="12" fill="#0f1b2d"/>
  <rect y="40" width="900" height="12" fill="#0f1b2d"/>
  <text x="450" y="33" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">AWS Global Infrastructure</text>

  <!-- AWS Cloud outer box -->
  <rect x="30" y="70" width="580" height="430" rx="10" fill="none" stroke="#ff9900" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="92" fill="#ff9900" font-size="13" font-weight="700">AWS CLOUD</text>

  <!-- Region box -->
  <rect x="50" y="105" width="540" height="380" rx="8" fill="#fff3e0" stroke="#ff9900" stroke-width="1.5"/>
  <text x="60" y="128" fill="#c76a00" font-size="13" font-weight="700">REGION (e.g. us-east-1)</text>

  <!-- AZ 1 -->
  <rect x="70" y="145" width="160" height="200" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="70" y="145" width="160" height="30" rx="8" fill="#2563eb"/>
  <rect x="70" y="167" width="160" height="8" fill="#2563eb"/>
  <text x="150" y="166" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Availability Zone 1a</text>
  <rect x="85" y="190" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="150" y="213" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 1</text>
  <rect x="85" y="236" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="150" y="259" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 2</text>
  <rect x="85" y="282" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="150" y="305" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 3</text>

  <!-- AZ 2 -->
  <rect x="250" y="145" width="160" height="200" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="250" y="145" width="160" height="30" rx="8" fill="#2563eb"/>
  <rect x="250" y="167" width="160" height="8" fill="#2563eb"/>
  <text x="330" y="166" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Availability Zone 1b</text>
  <rect x="265" y="190" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="330" y="213" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 1</text>
  <rect x="265" y="236" width="130" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="330" y="259" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 2</text>

  <!-- AZ 3 -->
  <rect x="430" y="145" width="150" height="200" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="145" width="150" height="30" rx="8" fill="#2563eb"/>
  <rect x="430" y="167" width="150" height="8" fill="#2563eb"/>
  <text x="505" y="166" fill="#fff" font-size="12" font-weight="600" text-anchor="middle">Availability Zone 1c</text>
  <rect x="445" y="190" width="120" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="505" y="213" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 1</text>
  <rect x="445" y="236" width="120" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="505" y="259" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 2</text>
  <rect x="445" y="282" width="120" height="36" rx="6" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
  <text x="505" y="305" fill="#1e40af" font-size="11" text-anchor="middle">Data Center 3</text>

  <!-- Connections between AZs -->
  <line x1="230" y1="245" x2="250" y2="245" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="410" y1="245" x2="430" y2="245" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="320" y="370" fill="#7c3aed" font-size="10" font-weight="600" text-anchor="middle">&lt; 2ms latency · Private fiber links between AZs</text>

  <!-- Bottom extensions -->
  <!-- Multi-AZ -->
  <rect x="70" y="395" width="155" height="75" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="148" y="418" fill="#166534" font-size="11" font-weight="700" text-anchor="middle">Multi-AZ Deploy</text>
  <text x="148" y="434" fill="#166534" font-size="10" text-anchor="middle">ALB + Auto Scaling</text>
  <text x="148" y="448" fill="#166534" font-size="10" text-anchor="middle">RDS Multi-AZ (sync)</text>
  <text x="148" y="462" fill="#15803d" font-size="9" text-anchor="middle">✓ HA within a Region</text>

  <!-- Multi-Region -->
  <rect x="240" y="395" width="155" height="75" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="318" y="418" fill="#92400e" font-size="11" font-weight="700" text-anchor="middle">Multi-Region Deploy</text>
  <text x="318" y="434" fill="#92400e" font-size="10" text-anchor="middle">Route 53 Failover</text>
  <text x="318" y="448" fill="#92400e" font-size="10" text-anchor="middle">Aurora Global DB</text>
  <text x="318" y="462" fill="#b45309" font-size="9" text-anchor="middle">✓ DR + Global latency</text>

  <!-- Hybrid -->
  <rect x="410" y="395" width="170" height="75" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="495" y="418" fill="#6b21a8" font-size="11" font-weight="700" text-anchor="middle">Hybrid / Edge</text>
  <text x="495" y="434" fill="#6b21a8" font-size="10" text-anchor="middle">Outposts · Local Zones</text>
  <text x="495" y="448" fill="#6b21a8" font-size="10" text-anchor="middle">Wavelength (5G edge)</text>
  <text x="495" y="462" fill="#7e22ce" font-size="9" text-anchor="middle">✓ Ultra-low latency</text>

  <!-- Right side: key info -->
  <rect x="635" y="70" width="245" height="430" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="757" y="100" fill="#0f1b2d" font-size="14" font-weight="700" text-anchor="middle">Quick Reference</text>
  <line x1="650" y1="110" x2="865" y2="110" stroke="#e2e8f0" stroke-width="1"/>

  <text x="650" y="135" fill="#64748b" font-size="10" font-weight="600">REGIONS</text>
  <text x="650" y="152" fill="#334155" font-size="11">• 33+ regions globally</text>
  <text x="650" y="168" fill="#334155" font-size="11">• Each has 2–6+ AZs</text>
  <text x="650" y="184" fill="#334155" font-size="11">• Choose by: latency, compliance</text>

  <text x="650" y="210" fill="#64748b" font-size="10" font-weight="600">AVAILABILITY ZONES</text>
  <text x="650" y="227" fill="#334155" font-size="11">• 105+ AZs worldwide</text>
  <text x="650" y="243" fill="#334155" font-size="11">• 1–5 data centers per AZ</text>
  <text x="650" y="259" fill="#334155" font-size="11">• Independent power, cooling</text>
  <text x="650" y="275" fill="#334155" font-size="11">• ≤ 2ms inter-AZ latency</text>

  <text x="650" y="301" fill="#64748b" font-size="10" font-weight="600">EDGE LOCATIONS</text>
  <text x="650" y="318" fill="#334155" font-size="11">• 450+ CloudFront PoPs</text>
  <text x="650" y="334" fill="#334155" font-size="11">• Lambda@Edge runs code</text>
  <text x="650" y="350" fill="#334155" font-size="11">• Route 53 DNS at edge</text>

  <text x="650" y="376" fill="#64748b" font-size="10" font-weight="600">ARCHITECT TIP</text>
  <rect x="645" y="383" width="225" height="55" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="757" y="400" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">"Design for Multi-AZ minimum.</text>
  <text x="757" y="414" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">Add Multi-Region for DR/global</text>
  <text x="757" y="428" fill="#1e40af" font-size="10" font-weight="600" text-anchor="middle">latency requirements."</text>

  <text x="650" y="462" fill="#64748b" font-size="10" font-weight="600">KEY SERVICES</text>
  <text x="650" y="479" fill="#334155" font-size="11">• Route 53 (DNS + failover)</text>
  <text x="650" y="495" fill="#334155" font-size="11">• CloudFront (CDN)</text>
</svg>
