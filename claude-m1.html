<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Certified Architect — Mock Exam</title>
  <meta name="description" content="Claude Certified Architect Mock Exam. Premium practice tests for Anthropic's Claude certifications.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #101012; /* Deep dark background */
      --surface: #18181B; /* Dark surface for cards */
      --surface2: #27272A; /* Slightly lighter for hovers/elements */
      --border: #3F3F46;
      --border-hover: #52525B;
      --accent: #E57B5C; /* Brightened Anthropic Rust */
      --accent-hover: #F28B6D;
      --text: #F4F4F5;
      --text-muted: #A1A1AA;
      --correct: #34D399;
      --correct-bg: rgba(16, 185, 129, 0.15);
      --wrong: #F87171;
      --wrong-bg: rgba(239, 68, 68, 0.15);
      --highlight: rgba(229, 123, 92, 0.12);
      
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 400;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── LANDING ── */
    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 80px 20px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      padding: 6px 16px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 40px;
      text-transform: uppercase;
      border: 1px solid var(--border);
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      font-weight: 600;
      color: var(--text);
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.15rem;
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 64px;
      font-weight: 400;
    }

    .mock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      margin-bottom: 48px;
    }

    .mock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .mock-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: var(--surface2);
    }

    .mock-card.completed {
      border-color: var(--correct);
      background: var(--correct-bg);
    }

    .mock-card.completed::after {
      content: '✓ COMPLETED';
      position: absolute;
      top: 20px;
      right: 20px;
      color: var(--correct);
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    .mock-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .mock-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--text);
      line-height: 1.3;
    }

    .mock-meta {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .score-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--correct);
      background: transparent;
      border: 1px solid var(--correct);
      padding: 4px 10px;
      border-radius: 4px;
      align-self: flex-start;
      margin-top: 24px;
    }

    .info-strip {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      border-top: 1px solid var(--border);
      padding-top: 32px;
      width: 100%;
    }

    .info-strip span {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── EXAM ── */
    #exam { display: none; min-height: 100vh; background: var(--bg); }

    .exam-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(16, 16, 18, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .exam-title-bar { flex: 1; }

    .exam-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
    }

    .exam-domain {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .progress-wrap {
      flex: 2;
      min-width: 200px;
    }

    .progress-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    .timer {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      min-width: 60px;
      text-align: right;
    }

    .timer.warning {
      color: var(--wrong);
      animation: pulse-warn 1s infinite alternate;
    }

    @keyframes pulse-warn {
      from { opacity: 1; }
      to { opacity: 0.5; }
    }

    .btn-exit {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-exit:hover {
      border-color: var(--text);
      color: var(--text);
      background: var(--surface2);
    }

    .exam-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 64px 24px 100px;
    }

    .q-block {
      margin-bottom: 48px;
      animation: fadeIn 0.4s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .q-header {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      align-items: baseline;
    }

    .q-number {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .q-text {
      font-family: var(--font-sans);
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--text);
      flex: 1;
      font-weight: 400;
    }

    .q-text code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--surface2);
      padding: 3px 6px;
      border-radius: 4px;
      color: var(--accent);
      font-weight: 500;
    }

    .q-type-tag {
      display: none;
    }

    .options {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-left: 36px;
    }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      font-family: var(--font-sans);
      font-size: 1rem;
      color: var(--text);
      transition: all 0.2s ease;
      line-height: 1.6;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: var(--surface2);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn.selected {
      border-color: var(--accent);
      background: var(--highlight);
    }

    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-bg);
    }

    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-bg);
    }

    .opt-label {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border-radius: 4px;
      flex-shrink: 0;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    .option-btn.selected .opt-label { background: var(--accent); color: #fff; }
    .option-btn.correct .opt-label { background: var(--correct); color: #fff; }
    .option-btn.wrong .opt-label { background: var(--wrong); color: #fff; }

    .explanation {
      margin-top: 24px;
      margin-left: 36px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--correct);
      border-radius: 4px;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }

    .explanation strong {
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 8px;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .btn-nav {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: var(--border-hover);
      background: var(--surface2);
    }

    .btn-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-submit {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #101012;
      padding: 10px 32px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* ── RESULTS ── */
    #results {
      display: none;
      min-height: 100vh;
      padding: 80px 24px;
      background: var(--bg);
    }

    .results-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .result-hero {
      text-align: center;
      margin-bottom: 80px;
    }

    .result-score-val {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 6rem;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
    }

    .result-verdict {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 2rem;
      margin-bottom: 16px;
      color: var(--text);
    }

    .result-sub {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-family: var(--font-sans);
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 64px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 32px 0;
    }

    .stat-box {
      text-align: center;
    }
    
    .stat-val {
      font-family: var(--font-mono);
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .stat-val.green { color: var(--correct); }
    .stat-val.red { color: var(--wrong); }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .domain-breakdown {
      margin-bottom: 64px;
    }

    .domain-breakdown h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 32px;
      color: var(--text);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .domain-row {
      margin-bottom: 24px;
    }

    .domain-name {
      font-size: 0.95rem;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      color: var(--text);
      font-weight: 500;
    }

    .domain-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .domain-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 1s ease 0.3s;
    }

    .result-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #101012;
      border: 1px solid var(--accent);
      padding: 12px 32px;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 32px;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--border-hover);
      background: var(--surface2);
    }

    .review-section {
      margin-top: 80px;
    }

    .review-section h3 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      margin-bottom: 32px;
      color: var(--text);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .review-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .review-item.ri-wrong {
      border-left: 4px solid var(--wrong);
    }

    .review-item.ri-correct {
      border-left: 4px solid var(--correct);
    }

    .review-q {
      font-family: var(--font-sans);
      font-size: 1.1rem;
      margin-bottom: 20px;
      line-height: 1.6;
      color: var(--text);
    }

    .review-answers {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .review-ans {
      font-size: 0.95rem;
      padding: 12px 16px;
      border-radius: 6px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 1px solid transparent;
    }

    .review-ans.your-wrong {
      background: var(--wrong-bg);
      color: var(--wrong);
      border-color: rgba(248, 113, 113, 0.2);
    }

    .review-ans.correct-ans {
      background: var(--correct-bg);
      color: var(--correct);
      border-color: rgba(52, 211, 153, 0.2);
    }

    .review-exp {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 24px;
      line-height: 1.6;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .result-stats { grid-template-columns: 1fr; gap: 24px; border: none; padding: 0; margin-bottom: 40px;}
      .exam-header { padding: 16px 20px; }
      .exam-body { padding: 40px 16px 60px; }
      .q-block { padding: 0; }
      .options { margin-left: 0; }
      .explanation { margin-left: 0; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>

<body>

  <!-- ─────────────── LANDING ─────────────── -->
  <div id="landing">
    <div class="logo-badge"><span class="logo-dot"></span> Anthropic Certification Prep</div>
    <h1>Claude Certified<br><em>Architect</em></h1>
    <p class="subtitle">Five realistic practice exams covering all domains of the Claude Certified Architect exam.
      Questions mirror the format and depth of the real assessment.</p>
    <div class="mock-grid" id="mock-grid"></div>
    <div class="info-strip">
      <span>⏱ 40 min per exam</span>
      <span>📋 25 questions each</span>
      <span>🎯 Pass threshold: 70%</span>
      <span>📚 5 domains covered</span>
    </div>
  </div>

  <!-- ─────────────── EXAM ─────────────── -->
  <div id="exam">
    <div class="exam-header">
      <div class="exam-title-bar">
        <div class="exam-domain" id="hdr-domain"></div>
        <div class="exam-name" id="hdr-name"></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="prog-label"></div>
      </div>
      <div class="timer" id="timer">40:00</div>
      <button class="btn-exit" onclick="exitExam()">✕ Exit</button>
    </div>
    <div class="exam-body" id="exam-body"></div>
  </div>

  <!-- ─────────────── RESULTS ─────────────── -->
  <div id="results">
    <div class="results-inner" id="results-inner"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    //  QUESTION BANK  (5 mocks × 25 Qs)
    // ═══════════════════════════════════════════════════
    const MOCKS = [
      {
        id: 0, title: "Core Architecture & API Design",
        domain: "Mock Exam 1 · API + Context",
        questions: [
          {
            text: "When designing a multi-turn conversation system with Claude, what is the correct way to maintain conversation history?",
            type: "Architecture",
            options: ["Store only the last user message and pass it each turn", "Pass the complete messages array including all previous turns in each API request", "Use a session ID parameter in the API to auto-retrieve history", "Store history in a Claude-managed server-side context object"],
            answer: 1,
            explanation: "Claude is stateless. The entire conversation history (all prior user and assistant turns) must be included in the `messages` array with every API request. There is no server-side session management."
          },
          {
            text: "Which Claude model family is specifically optimized for intelligence-intensive tasks requiring deep analysis and sophisticated reasoning?",
            type: "Models",
            options: ["Claude Haiku", "Claude Sonnet", "Claude Opus", "Claude Instant"],
            answer: 2,
            explanation: "Claude Opus is Anthropic's most capable model, designed for complex reasoning and intelligence-intensive tasks. Haiku prioritizes speed/cost, Sonnet balances both. 'Claude Instant' is not a current model family name."
          },
          {
            text: "An architect wants to extract structured JSON from Claude reliably. What is the BEST approach?",
            type: "Prompt Eng.",
            options: ["Ask Claude to 'try' to respond in JSON", "Use the system prompt to instruct Claude to respond only in valid JSON, then parse the output", "Rely on Claude's default behavior to detect JSON intent", "Use base64 encoding to force JSON output"],
            answer: 1,
            explanation: "Explicitly instructing Claude in the system prompt to return only valid JSON (with no preamble or markdown) is the recommended approach. You should also validate/parse carefully and handle edge cases."
          },
          {
            text: "What does the `max_tokens` parameter control in an API request to Claude?",
            type: "API",
            options: ["The maximum number of tokens in the input prompt", "The total tokens consumed by the entire request", "The maximum number of tokens Claude may generate in its response", "The number of API calls per minute allowed"],
            answer: 2,
            explanation: "`max_tokens` limits the length of Claude's *output* (completion). It does not affect input size. Requests will be rejected if the input itself exceeds the model's context window."
          },
          {
            text: "You need Claude to play a consistent persona across thousands of independent API calls. Where should the persona instructions be placed?",
            type: "Architecture",
            options: ["As the first user message in each request", "In a pre-turn assistant message", "In the system prompt, passed with every request", "In the model name parameter"],
            answer: 2,
            explanation: "The system prompt is the designated place for persistent instructions, personas, and context. It is passed with every request and sets the behavioral frame before any user turn."
          },
          {
            text: "Which Claude API feature allows you to process a large volume of independent requests asynchronously at reduced cost?",
            type: "API",
            options: ["Streaming", "Tool use", "Message Batches API", "Prompt caching"],
            answer: 2,
            explanation: "The Message Batches API lets you submit large numbers of requests asynchronously. Results are available later, and the cost is significantly lower than synchronous requests — ideal for bulk workloads."
          },
          {
            text: "Prompt caching in the Claude API is most beneficial when:",
            type: "Cost Optimization",
            options: ["Each request has a completely unique system prompt", "A large, fixed system prompt or document is reused across many requests", "Users send very short single-turn questions", "Streaming is enabled for all responses"],
            answer: 1,
            explanation: "Prompt caching saves tokens (and cost) by caching repeated prefixes — particularly useful for lengthy, static system prompts or large reference documents shared across many calls."
          },
          {

    // ════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════
    let state = {
      mockId: null,
      currentQ: 0,
      answers: {},        // qIndex → optionIndex
      revealed: {},       // qIndex → true
      timer: null,
      secondsLeft: 40 * 60,
      completed: JSON.parse(localStorage.getItem('cca_completed') || '{}')
    };

    // ════════════════════════════════════════
    //  LANDING
    // ════════════════════════════════════════
    function buildLanding() {
      const grid = document.getElementById('mock-grid');
      grid.innerHTML = '';
      MOCKS.forEach((m, i) => {
        const done = state.completed[i];
        const el = document.createElement('div');
        el.className = 'mock-card' + (done ? ' completed' : '');
        el.innerHTML = `
      <div class="mock-num">Mock ${i + 1}</div>
      <div class="mock-title">${m.title}</div>
      <div class="mock-meta">25 questions · 40 min</div>
      ${done ? `<div class="score-badge">Score: ${done.score}%</div>` : ''}
      <div style="margin-top: 16px; display: flex; gap: 12px;">
        <button class="btn-primary" onclick="event.stopPropagation(); startMock(${i})" style="padding: 8px 16px; font-size: 0.85rem;">Start Exam</button>
        <button class="btn-secondary" onclick="event.stopPropagation(); viewAnswers(${i})" style="padding: 8px 16px; font-size: 0.85rem;">View Answers</button>
      </div>
    `;
        el.onclick = () => startMock(i);
        grid.appendChild(el);
      });
    }

    function viewAnswers(id) {
      state.mockId = id;
      state.currentQ = 0;
      state.answers = {};
      state.revealed = {};
      state.secondsLeft = 40 * 60;
      submitExam();
    }

    // ════════════════════════════════════════
    //  START EXAM
    // ════════════════════════════════════════
    function startMock(id) {
      state.mockId = id;
      state.currentQ = 0;
      state.answers = {};
      state.revealed = {};
      state.secondsLeft = 40 * 60;

      document.getElementById('landing').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      document.getElementById('exam').style.display = 'block';

      const mock = MOCKS[id];
      document.getElementById('hdr-name').textContent = mock.title;
      document.getElementById('hdr-domain').textContent = mock.domain;

      startTimer();
      renderQuestions();
    }

    function startTimer() {
      clearInterval(state.timer);
      state.timer = setInterval(() => {
        state.secondsLeft--;
        updateTimer();
        if (state.secondsLeft <= 0) { clearInterval(state.timer); submitExam(); }
      }, 1000);
      updateTimer();
    }

    function updateTimer() {
      const m = Math.floor(state.secondsLeft / 60);
      const s = state.secondsLeft % 60;
      const el = document.getElementById('timer');
      el.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      el.className = 'timer' + (state.secondsLeft < 180 ? ' warning' : '');
    }

    // ════════════════════════════════════════
    //  RENDER QUESTIONS (show all at once, paginated in groups of 5)
    // ════════════════════════════════════════
    const PAGE_SIZE = 5;

    function renderQuestions() {
      const mock = MOCKS[state.mockId];
      const total = mock.questions.length;
      const page = Math.floor(state.currentQ / PAGE_SIZE);
      const start = page * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, total);

      // progress
      const answered = Object.keys(state.answers).length;
      document.getElementById('prog-fill').style.width = `${(answered / total) * 100}%`;
      document.getElementById('prog-label').textContent = `${answered} / ${total} answered`;

      const body = document.getElementById('exam-body');
      body.innerHTML = '';

      for (let i = start; i < end; i++) {
        const q = mock.questions[i];
        const userAns = state.answers[i];
        const revealed = state.revealed[i];

        const block = document.createElement('div');
        block.className = 'q-block';
        block.style.animationDelay = `${(i - start) * 0.06}s`;

        let optsHTML = q.options.map((opt, j) => {
          let cls = 'option-btn';
          let labelCls = 'opt-label';
          if (revealed) {
            if (j === q.answer) { cls += ' correct'; labelCls += ' correct'; }
            else if (j === userAns && j !== q.answer) { cls += ' wrong'; labelCls += ' wrong'; }
          } else {
            if (j === userAns) cls += ' selected';
          }
          const disabled = revealed ? 'disabled' : '';
          return `<li><button class="${cls}" ${disabled} onclick="selectAnswer(${i}, ${j})">
        <span class="${labelCls}">${String.fromCharCode(65 + j)}.</span>
        <span>${opt}</span>
      </button></li>`;
        }).join('');

        let expHTML = '';
        if (revealed) {
          expHTML = `<div class="explanation"><strong>Explanation:</strong> ${q.explanation}</div>`;
        }

        block.innerHTML = `
      <div class="q-header">
        <span class="q-number">Q${i + 1}</span>
        <span class="q-type-tag">${q.type}</span>
        <span class="q-text">${q.text}</span>
      </div>
      <ul class="options">${optsHTML}</ul>
      ${expHTML}
    `;
        body.appendChild(block);
      }

      // nav
      const nav = document.createElement('div');
      nav.className = 'nav-bar';

      const prevBtn = `<button class="btn-nav" onclick="changePage(-1)" ${page === 0 ? 'disabled' : ''}>← Previous</button>`;

      const isLastPage = end >= total;
      const allAnswered = Object.keys(state.answers).length === total;

      let rightBtn;
      if (isLastPage) {
        rightBtn = `<button class="btn-submit" onclick="submitExam()">Submit Exam →</button>`;
      } else {
        rightBtn = `<button class="btn-nav" onclick="changePage(1)">Next →</button>`;
      }

      const pageInfo = `<span style="color:var(--text-muted);font-family:'DM Mono',monospace;font-size:.82rem;">
    Page ${page + 1} / ${Math.ceil(total / PAGE_SIZE)}
  </span>`;

      nav.innerHTML = prevBtn + pageInfo + rightBtn;
      body.appendChild(nav);

      window.scrollTo(0, 0);
    }

    function changePage(dir) {
      state.currentQ = Math.max(0, Math.min(
        MOCKS[state.mockId].questions.length - 1,
        state.currentQ + dir * PAGE_SIZE
      ));
      renderQuestions();
    }

    function selectAnswer(qIdx, optIdx) {
      if (state.revealed[qIdx]) return;
      state.answers[qIdx] = optIdx;
      state.revealed[qIdx] = true;
      renderQuestions();
    }

    function exitExam() {
      if (confirm('Exit the exam? Your progress will be lost.')) {
        clearInterval(state.timer);
        document.getElementById('exam').style.display = 'none';
        document.getElementById('landing').style.display = 'flex';
        buildLanding();
      }
    }

    // ════════════════════════════════════════
    //  SUBMIT & RESULTS
    // ════════════════════════════════════════
    function submitExam() {
      clearInterval(state.timer);
      const mock = MOCKS[state.mockId];
      const total = mock.questions.length;

      let correct = 0;
      const domainStats = {};

      mock.questions.forEach((q, i) => {
        if (!domainStats[q.type]) domainStats[q.type] = { correct: 0, total: 0 };
        domainStats[q.type].total++;
        if (state.answers[i] === q.answer) { correct++; domainStats[q.type].correct++; }
      });

      const pct = Math.round((correct / total) * 100);
      const pass = pct >= 70;
      const timeTaken = 40 * 60 - state.secondsLeft;
      const tm = Math.floor(timeTaken / 60), ts = timeTaken % 60;

      // save
      state.completed[state.mockId] = { score: pct };
      localStorage.setItem('cca_completed', JSON.stringify(state.completed));

      document.getElementById('exam').style.display = 'none';
      document.getElementById('results').style.display = 'block';

      // build results
      const wrong = total - correct;
      const domainRows = Object.entries(domainStats).map(([name, d]) => {
        const dp = Math.round((d.correct / d.total) * 100);
        const col = dp >= 70 ? 'var(--correct)' : dp >= 50 ? 'var(--accent2)' : 'var(--wrong)';
        return `<div class="domain-row">
      <div class="domain-name"><span>${name}</span><span style="color:${col}">${dp}%</span></div>
      <div class="domain-bar-bg"><div class="domain-bar-fill" style="width:${dp}%;background:${col}"></div></div>
    </div>`;
      }).join('');

      const reviewItems = mock.questions.map((q, i) => {
        const ua = state.answers[i];
        const isCorrect = ua === q.answer;
        return `<div class="review-item ${isCorrect ? 'ri-correct' : 'ri-wrong'}">
      <div class="review-q"><strong>Q${i + 1}.</strong> ${q.text}</div>
      <div class="review-answers">
        ${!isCorrect ? `<div class="review-ans your-wrong">✗ Your answer: ${ua !== undefined ? q.options[ua] : 'Not answered'}</div>` : ''}
        <div class="review-ans correct-ans">✓ ${isCorrect ? 'Correct' : 'Correct answer'}: ${q.options[q.answer]}</div>
      </div>
      ${!isCorrect ? `<div class="review-exp">${q.explanation}</div>` : ''}
    </div>`;
      }).join('');

      document.getElementById('results-inner').innerHTML = `
    <div class="result-hero">
      <div class="result-score-ring" style="--pct:${pct}">
        <span class="result-score-val">${pct}%</span>
      </div>
      <div class="result-verdict">${pass ? '🎉 Pass!' : '📚 Not Yet'}</div>
      <div class="result-sub">${pass ? 'You met the 70% pass threshold.' : 'Keep studying — you need 70% to pass.'} Time: ${tm}m ${ts}s</div>
    </div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val green">${correct}</div><div class="stat-label">Correct</div></div>
      <div class="stat-box"><div class="stat-val red">${wrong}</div><div class="stat-label">Wrong</div></div>
      <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${pct}%</div><div class="stat-label">Score</div></div>
    </div>
    <div class="domain-breakdown">
      <h3>Performance by Domain</h3>
      ${domainRows}
    </div>
    <div class="result-actions">
      <button class="btn-primary" onclick="retakeMock()">Retake Exam</button>
      <button class="btn-secondary" onclick="backToHome()">All Mocks</button>
    </div>
    <div class="review-section">
      <h3>Full Review</h3>
      ${reviewItems}
    </div>
  `;

      window.scrollTo(0, 0);
    }

    function retakeMock() {
      startMock(state.mockId);
    }

    function backToHome() {
      document.getElementById('results').style.display = 'none';
      document.getElementById('landing').style.display = 'flex';
      buildLanding();
    }

    // ════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════
    buildLanding();
  </script>
